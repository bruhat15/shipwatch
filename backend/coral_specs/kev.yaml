name: kev
version: 0.1.0
dsl_version: 3
backend: http
description: >-
  CISA Known Exploited Vulnerabilities (KEV) catalog — the authoritative US government
  list of CVEs that are actively being exploited in the wild. Maintained by the
  Cybersecurity and Infrastructure Security Agency (CISA). Federal agencies are
  required to remediate KEV entries within defined timeframes. Contains ransomware
  campaign flags — extremely high-signal data for prioritization.
  Updated continuously; this spec fetches the latest snapshot on every query.
base_url: https://www.cisa.gov
request_headers:
  - name: Accept
    from: literal
    value: application/json
tables:
  - name: vulnerabilities
    description: >-
      All CVEs in the CISA KEV catalog with vendor, product, required remediation
      action, due date, and ransomware campaign usage flag.
      No filter required — returns the full catalog (~1600+ entries).
      If a CVE appears here, it is confirmed exploited in the wild.
    filters: []
    request:
      method: GET
      path: /sites/default/files/feeds/known_exploited_vulnerabilities.json
    response:
      rows_path: [vulnerabilities]
      row_strategy: direct
    columns:
      - name: cve_id
        type: Utf8
        nullable: false
        description: CVE identifier (e.g. "CVE-2021-44228").
        expr:
          kind: path
          path: [cveID]

      - name: vendor
        type: Utf8
        nullable: true
        description: Vendor or project name (e.g. "Apache", "Microsoft").
        expr:
          kind: path
          path: [vendorProject]

      - name: product
        type: Utf8
        nullable: true
        description: Affected product name.
        expr:
          kind: path
          path: [product]

      - name: vulnerability_name
        type: Utf8
        nullable: true
        description: Human-readable vulnerability name from CISA.
        expr:
          kind: path
          path: [vulnerabilityName]

      - name: date_added
        type: Utf8
        nullable: true
        description: ISO 8601 date when CISA added this CVE to the KEV catalog.
        expr:
          kind: path
          path: [dateAdded]

      - name: short_description
        type: Utf8
        nullable: true
        description: Brief description of the vulnerability from CISA.
        expr:
          kind: path
          path: [shortDescription]

      - name: required_action
        type: Utf8
        nullable: true
        description: >-
          CISA's required remediation action for federal agencies.
          Provides concrete guidance on what to do.
        expr:
          kind: path
          path: [requiredAction]

      - name: due_date
        type: Utf8
        nullable: true
        description: ISO 8601 date by which federal agencies must remediate this vulnerability.
        expr:
          kind: path
          path: [dueDate]

      - name: ransomware_use
        type: Utf8
        nullable: true
        description: >-
          Whether this vulnerability is known to be used in ransomware campaigns.
          Values: "Known" or "Unknown". "Known" is extremely high-priority signal.
        expr:
          kind: path
          path: [knownRansomwareCampaignUse]

test_queries:
  - "SELECT cve_id, vulnerability_name, ransomware_use, due_date FROM kev.vulnerabilities LIMIT 10"
  - "SELECT cve_id, vendor, product FROM kev.vulnerabilities WHERE ransomware_use = 'Known' LIMIT 20"
  - "SELECT COUNT(*) AS total_kev FROM kev.vulnerabilities"
